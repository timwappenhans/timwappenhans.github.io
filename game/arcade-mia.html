<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADE-MIA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e9e9e3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    image-rendering: pixelated;
  }

  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
  }

  canvas {
    display: block;
    width: 800px;
    height: 300px;
    max-width: 100vw;
    background: #f7f7f7;
    border: 2px solid #cfcfc9;
    border-radius: 2px;
  }

  #mobile-hint {
    display: none;
    color: #acacac;
    font-size: 8px;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  @media (max-width: 820px) {
    canvas { width: 100vw; height: auto; }
    #mobile-hint { display: block; }
  }

  /* Fade up out of the launch sequence's light resolve — no dark snap, no load blink */
  #boot-fade {
    position: fixed; inset: 0; background: #f7f7f7;
    z-index: 9999; pointer-events: none;
    animation: boot-fade-out 0.5s ease forwards;
  }
  @keyframes boot-fade-out { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<div id="boot-fade"></div>

<div id="game-wrapper">
  <canvas id="game" width="800" height="300"></canvas>
  <div id="mobile-hint">TAP UPPER = JUMP &nbsp;·&nbsp; TAP LOWER = DUCK</div>
</div>

<script>
// ============================================================
//  ARCADE-MIA — The Academic Career Runner (Dino edition)
//  An easter egg by Tim Wappenhans
//  Style: toned-down Chrome-Dino — mono, light, minimal.
//  Mechanics: jump + duck, power-ups (coffee / shield / slow-mo).
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 300;
const groundY = H - 50;

// ---------- PALETTE (mono, light) ----------
const PAL = {
  field: '#f7f7f7',
  ink:   '#535353',
  inkSoft: '#7a7a7a',
  dim:   '#acacac',
  faint: '#dcdcd6',
};

// ---------- GAME STATE ----------
let state = 'title'; // title | playing | gameover
let score = 0;
let hIndex = 0; // high score ("h-index")
let levelIndex = 0;
let levelTimer = 0;
let gameSpeed = 5;
let frameCount = 0;
let shakeX = 0, shakeY = 0;
let flashAlpha = 0;
let deathReason = '';

// ---------- LEVELS ----------
// Each level: a few ground obstacles (JUMP) + at least one high banner (DUCK).
const LEVELS = [
  { name: 'PhD Student',     duration: 620, speedMult: 1.00, ground: ['papers', 'deadline'],     high: ['committee'],    collectible: 'citation' },
  { name: 'Post-Doc',        duration: 700, speedMult: 1.12, ground: ['randr', 'deadline'],       high: ['adminmeeting'], collectible: 'publication' },
  { name: 'Grant Recipient', duration: 780, speedMult: 1.24, ground: ['budget', 'papers'],        high: ['bureaucracy'],  collectible: 'grant' },
  { name: 'Tenure Track',    duration: 860, speedMult: 1.36, ground: ['rejection', 'randr'],       high: ['evaluation'],   collectible: 'citation' },
  { name: 'TENURE',          duration: 940, speedMult: 1.50, ground: ['restructuring', 'deadline'], high: ['apsrreject'],  collectible: 'publication', isFinal: true },
];

// ---------- OBSTACLE DEFINITIONS ----------
// kind 'ground' -> jump over.  kind 'high' -> duck under (hanging banner).
const OB = {
  papers:        { kind: 'ground', w: 30, h: 24 },
  deadline:      { kind: 'ground', w: 30, h: 30 },
  rejection:     { kind: 'ground', w: 34, h: 26 },
  randr:         { kind: 'ground', w: 32, h: 28, label: 'R&R' },
  budget:        { kind: 'ground', w: 34, h: 28, label: '-€' },
  restructuring: { kind: 'ground', w: 38, h: 30, label: 'CUT' },
  committee:     { kind: 'high',   w: 40 },   // wall clock — "another meeting"
  adminmeeting:  { kind: 'high',   w: 46 },   // ZZZ bubble — endless admin meeting
  bureaucracy:   { kind: 'high',   w: 34 },   // clipboard — red tape
  evaluation:    { kind: 'high',   w: 38 },   // report card — "D-"
  apsrreject:    { kind: 'high',   w: 48 },   // paper airplane — manuscript returned
};
const HIGH_TOP = 40;                 // string anchored up here
const SIGN_TOP = groundY - 82;       // the dangling object hangs at head height...
const SIGN_BOT = groundY - 38;       // ...with a gap beneath to slide under

// ---------- PLAYER ----------
const STAND_H = 54, STAND_W = 24;
const DUCK_H = 24, DUCK_W = 34;
const player = {
  x: 90,
  feetY: groundY,
  vy: 0,
  grounded: true,
  ducking: false,
  frame: 0,
  frameTimer: 0,
  coffeeBoost: 0,
  slowmo: 0,
  shield: false,
  invuln: 0,
};

// ---------- COLLECTIONS ----------
let obstacles = [];
let collectibles = [];
let particles = [];
let finishLine = null;
let finishReached = false;
let celebrationTimer = 0;

// ---------- INPUT ----------
let duckHeld = false;
function pressJump() {
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { resetToTitle(); return; }
  if (state === 'playing' && player.grounded && !finishReached) {
    player.vy = -12;
    player.grounded = false;
    player.ducking = false;
  }
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); pressJump(); }
  if (e.code === 'ArrowDown') { e.preventDefault(); duckHeld = true; }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') duckHeld = false;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const ty = e.touches[0].clientY - rect.top;
  const lower = ty > rect.height * 0.55;
  if (state !== 'playing') { pressJump(); return; }
  if (lower) duckHeld = true; else pressJump();
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); duckHeld = false; }, { passive: false });
canvas.addEventListener('click', () => { if (state !== 'playing') pressJump(); });

// ---------- DRAW HELPERS ----------
function px(x, y, w, h, c) { ctx.fillStyle = c || PAL.ink; ctx.fillRect(x | 0, y | 0, w, h); }
function knockText(txt, x, y, size) {
  ctx.fillStyle = PAL.field;
  ctx.font = size + 'px "Press Start 2P"';
  ctx.fillText(txt, x, y);
}
function roundRect(x, y, w, h, r, c) {
  ctx.fillStyle = c || PAL.ink;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill();
}

// ---------- CHARACTER: classic scholar (Variant A) ----------
function drawScholar(L, F, mode) {
  // shadow
  px(L + 2, groundY - 2, mode === 'duck' ? 34 : 22, 4, 'rgba(0,0,0,0.10)');

  ctx.fillStyle = PAL.ink;

  if (mode === 'duck') {
    // crouched, leaning forward
    px(L + 2, F - 18, 22, 12);          // torso (horizontal)
    px(L + 20, F - 22, 14, 12);         // head forward
    px(L + 20, F - 24, 14, 3);          // hair
    // glasses knockout
    px(L + 23, F - 18, 4, 4, PAL.field);
    px(L + 28, F - 18, 4, 4, PAL.field);
    px(L + 27, F - 18, 1, 4, PAL.ink);
    // legs scrambling
    const f = Math.floor(frameCount / 5) % 2;
    px(L + 4, F - 6, 5, 6, PAL.ink);
    px(L + 12, F - 6, 5, 6, PAL.ink);
    px(f ? L - 2 : L + 18, F - 4, 7, 4, PAL.ink); // trailing foot
    return;
  }

  const jumping = (mode === 'jump');
  // torso + head + hair
  px(L + 4, F - 36, 16, 24);            // torso
  px(L + 2, F - 52, 20, 16);            // head
  px(L,     F - 56, 24, 6);             // hair top
  px(L,     F - 52, 4, 5);              // sideburn
  // glasses (knocked out of silhouette)
  px(L + 4, F - 46, 7, 5, PAL.field);
  px(L + 13, F - 46, 7, 5, PAL.field);
  px(L + 11, F - 46, 2, 2, PAL.ink);    // bridge

  if (jumping) {
    // arms up, legs tucked
    px(L,      F - 42, 4, 12, PAL.ink);
    px(L + 20, F - 42, 4, 12, PAL.ink);
    px(L + 4,  F - 12, 5, 8, PAL.ink);
    px(L + 13, F - 12, 5, 8, PAL.ink);
  } else {
    // running
    const f = Math.floor(frameCount / 5) % 4;
    const swing = f % 2 === 0 ? 0 : 2;
    px(L,      F - 34 + swing, 4, 12, PAL.ink);   // back arm
    px(L + 20, F - 34 - swing, 4, 12, PAL.ink);   // front arm
    if (f % 4 < 2) {
      px(L + 4,  F - 12, 5, 12, PAL.ink);
      px(L + 13, F - 8,  5, 8,  PAL.ink);
    } else {
      px(L + 4,  F - 8,  5, 8,  PAL.ink);
      px(L + 13, F - 12, 5, 12, PAL.ink);
    }
  }

  // shield ring
  if (player.shield) {
    ctx.strokeStyle = PAL.inkSoft;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(L - 5, F - 60, 34, 64);
    ctx.setLineDash([]);
  }
  // coffee in hand
  if (player.coffeeBoost > 0) {
    px(L + 22, F - 30, 6, 8, PAL.ink);
    if (frameCount % 20 < 10) px(L + 24, F - 36, 2, 3, PAL.dim);
  }
}

// ---------- HIGH (DUCK) OBSTACLES — funny dangling objects ----------
function drawHighSign(obs) {
  const def = OB[obs.type], w = def.w, x = Math.floor(obs.x);
  const bob = Math.sin(frameCount * 0.1 + obs.x * 0.05) * 2;
  const top = SIGN_TOP + bob, bot = SIGN_BOT + bob;
  const cx = x + w / 2, midY = (top + bot) / 2, h = bot - top;

  // hanging string
  px(cx - 1, HIGH_TOP, 2, top - HIGH_TOP, PAL.dim);
  ctx.fillStyle = PAL.ink;

  switch (obs.type) {
    case 'committee': { // wall clock = "another meeting"
      const r = w / 2;
      px(cx - 2, top - 4, 4, 4, PAL.ink);                    // top knob
      ctx.beginPath(); ctx.arc(cx, midY, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = PAL.field; ctx.beginPath(); ctx.arc(cx, midY, r - 3, 0, Math.PI * 2); ctx.fill();
      px(cx - 1, midY - 9, 2, 10, PAL.ink);                  // hour hand
      px(cx - 1, midY - 1, 9, 2, PAL.ink);                   // minute hand
      break;
    }
    case 'adminmeeting': { // speech bubble "ZZZ" = endless meeting
      roundRect(x, top, w, h - 7, 7, PAL.ink);
      ctx.beginPath(); ctx.moveTo(cx - 5, bot - 9); ctx.lineTo(cx + 6, bot - 9); ctx.lineTo(cx - 2, bot); ctx.closePath(); ctx.fill();
      ctx.textAlign = 'center'; knockText('ZZZ', cx, midY - 1, 9); ctx.textAlign = 'left';
      break;
    }
    case 'bureaucracy': { // clipboard = red tape
      px(x, top + 2, w, h - 2, PAL.ink);
      px(cx - 5, top - 2, 10, 6, PAL.ink);                   // clip
      for (let i = 0; i < 3; i++) px(x + 5, top + 12 + i * 9, w - 10, 2, PAL.field);
      break;
    }
    case 'evaluation': { // report card = "D-"
      px(x, top, w, h, PAL.ink);
      px(x + 3, top + 3, w - 6, 5, PAL.field);               // header strip
      ctx.textAlign = 'center'; knockText('D-', cx, midY + 9, 13); ctx.textAlign = 'left';
      break;
    }
    case 'apsrreject': { // paper airplane = manuscript returned
      ctx.beginPath();
      ctx.moveTo(x, midY);
      ctx.lineTo(x + w, top + 3);
      ctx.lineTo(x + w - 12, midY + 3);
      ctx.lineTo(x + w, bot - 3);
      ctx.closePath(); ctx.fill();
      px(x + w - 12, midY - 7, 2, 14, PAL.field);            // center fold
      break;
    }
  }
}

// ---------- OBSTACLES ----------
function drawObstacle(obs) {
  const def = OB[obs.type];
  const x = Math.floor(obs.x);
  ctx.fillStyle = PAL.ink;

  if (def.kind === 'high') { drawHighSign(obs); return; }

  // ground obstacles — sit on the line, jump over
  const y = groundY - def.h;
  switch (obs.type) {
    case 'papers':
      for (let i = 0; i < 3; i++) {
        px(x + i * 2, y + i * 6, 26, 16, PAL.ink);
        px(x + i * 2 + 3, y + i * 6 + 4, 16, 1, PAL.field);
        px(x + i * 2 + 3, y + i * 6 + 8, 12, 1, PAL.field);
      }
      break;
    case 'deadline': // clock
      px(x + 2, y, 26, 26, PAL.ink);
      px(x + 13, y + 5, 2, 9, PAL.field);   // hand
      px(x + 13, y + 12, 8, 2, PAL.field);  // hand
      px(x + 11, y - 5, 3, 4, PAL.ink);     // bell stem
      break;
    case 'rejection': // envelope
      px(x, y + 2, 34, 24, PAL.ink);
      px(x + 2, y + 4, 30, 12, PAL.field);  // flap area
      px(x + 14, y + 9, 6, 6, PAL.ink);     // X-ish stamp
      ctx.textAlign = 'center';
      knockText('NO', x + 17, y + 22, 7);
      ctx.textAlign = 'left';
      break;
    default: // labelled block (randr, budget, restructuring)
      px(x, y, def.w, def.h, PAL.ink);
      px(x + 6, y, 1, def.h, PAL.field);    // spine line
      ctx.textAlign = 'center';
      knockText(def.label, x + def.w / 2 + 2, y + def.h / 2 + 4, def.label.length > 2 ? 6 : 8);
      ctx.textAlign = 'left';
  }
}

// ---------- COLLECTIBLES & POWER-UPS ----------
function drawCollectible(col) {
  const x = Math.floor(col.x), y = Math.floor(col.y);
  ctx.fillStyle = PAL.ink;
  switch (col.type) {
    case 'coffee':
      px(x + 2, y + 4, 16, 14, PAL.ink);
      px(x + 18, y + 7, 5, 8, PAL.ink);     // handle
      px(x + 5, y + 7, 10, 6, PAL.field);   // knockout
      if (frameCount % 16 < 8) px(x + 6, y - 1, 2, 4, PAL.dim);
      break;
    case 'shield':
      px(x + 4, y, 16, 6, PAL.ink);
      px(x + 2, y + 4, 20, 8, PAL.ink);
      px(x + 5, y + 11, 14, 6, PAL.ink);
      px(x + 9, y + 16, 6, 4, PAL.ink);
      px(x + 9, y + 5, 4, 6, PAL.field);    // knockout cross
      px(x + 7, y + 7, 8, 2, PAL.field);
      break;
    case 'slowmo': // hourglass
      px(x + 2, y, 18, 3, PAL.ink);
      px(x + 2, y + 18, 18, 3, PAL.ink);
      for (let i = 0; i < 7; i++) px(x + 4 + i, y + 3 + i, 12 - i * 2, 2, PAL.ink);
      for (let i = 0; i < 7; i++) px(x + 10 - i, y + 17 - i, i * 2 + 2, 2, PAL.ink);
      break;
    case 'citation':
      px(x + 6, y, 10, 10, PAL.ink);
      px(x + 3, y + 3, 16, 4, PAL.ink);
      px(x + 8, y - 3, 6, 16, PAL.ink);
      px(x + 8, y + 4, 4, 2, PAL.field);
      break;
    case 'publication':
      px(x, y, 22, 16, PAL.ink);
      px(x + 11, y, 1, 16, PAL.field);
      ctx.textAlign = 'center';
      knockText('PUB', x + 11, y + 11, 5);
      ctx.textAlign = 'left';
      break;
    case 'grant':
      px(x + 2, y, 18, 16, PAL.ink);
      ctx.textAlign = 'center';
      knockText('€', x + 11, y + 13, 9);
      ctx.textAlign = 'left';
      break;
  }
}

// ---------- FINISH LINE ----------
function initFinishLine() {
  const level = LEVELS[levelIndex];
  const spd = gameSpeed * level.speedMult;
  finishLine = { x: W + level.duration * spd, reached: false };
  finishReached = false;
  celebrationTimer = 0;
}
function drawFinishLine() {
  if (!finishLine || finishLine.x > W + 60) return;
  const x = Math.floor(finishLine.x);
  const poleTop = groundY - 150;
  // checkered pole
  for (let i = 0; i < 150; i += 12) {
    const even = Math.floor(i / 12) % 2 === 0;
    px(x, poleTop + i, 8, 12, even ? PAL.ink : PAL.field);
    px(x + 8, poleTop + i, 8, 12, even ? PAL.field : PAL.ink);
  }
  // flag
  const level = LEVELS[levelIndex], next = LEVELS[levelIndex + 1];
  px(x + 16, poleTop, 96, 40, PAL.ink);
  ctx.textAlign = 'center';
  if (level.isFinal) {
    knockText('TENURE!', x + 64, poleTop + 18, 9);
    knockText('FINISH', x + 64, poleTop + 32, 7);
  } else if (next) {
    knockText('NEXT', x + 64, poleTop + 16, 8);
    knockText(next.name.toUpperCase().slice(0, 9), x + 64, poleTop + 31, 6);
  }
  ctx.textAlign = 'left';
  // checkered ground strip
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < 4; c++)
      if ((r + c) % 2 === 0) px(x - 8 + c * 12, groundY + 2 + r * 8, 12, 8, PAL.ink);
}

// ---------- PARTICLES ----------
let floatTexts = [];
function spawnParticles(x, y, count, color) {
  // small, short-lived dust puffs — Dino keeps it minimal
  for (let i = 0; i < count; i++)
    particles.push({ x, y, vx: (Math.random() - 0.5) * 3, vy: -1 - Math.random() * 1.5,
      life: 10 + Math.random() * 8, size: 2, color: color || PAL.dim });
}
function spawnFloat(x, y, txt) { floatTexts.push({ x, y, txt, life: 46 }); }
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    floatTexts[i].y -= 0.6; floatTexts[i].life--;
    if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(p => { ctx.globalAlpha = Math.min(1, p.life / 12); px(p.x, p.y, p.size, p.size, p.color); });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center'; ctx.font = '7px "Press Start 2P"';
  floatTexts.forEach(ft => {
    ctx.globalAlpha = Math.min(1, ft.life / 30); ctx.fillStyle = PAL.ink;
    ctx.fillText(ft.txt, ft.x, ft.y);
  });
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// ---------- BACKGROUND ----------
let pebbles = [];
for (let i = 0; i < 14; i++) pebbles.push({ x: Math.random() * W, y: groundY + 8 + Math.random() * 24, w: 2 + Math.random() * 3 });
let clouds = [];
for (let i = 0; i < 4; i++) clouds.push({ x: Math.random() * W, y: 50 + Math.random() * 90, s: 0.5 + Math.random() * 0.5 });

function drawBackground(scrollSpd) {
  // clouds (slow parallax)
  clouds.forEach(c => {
    c.x -= scrollSpd * 0.15 * c.s;
    if (c.x < -60) { c.x = W + 40; c.y = 50 + Math.random() * 90; }
    ctx.fillStyle = PAL.faint;
    const cx = c.x | 0, cy = c.y | 0;
    px(cx, cy, 26, 8, PAL.faint); px(cx + 6, cy - 5, 16, 6, PAL.faint); px(cx + 14, cy - 8, 12, 6, PAL.faint);
  });
  // ground line
  px(0, groundY, W, 2, PAL.ink);
  // pebbles
  pebbles.forEach(p => {
    p.x -= scrollSpd;
    if (p.x < -6) { p.x = W + Math.random() * 60; p.y = groundY + 8 + Math.random() * 24; }
    px(p.x, p.y, p.w, 2, PAL.dim);
  });
}

// ---------- SPAWNING ----------
let spawnTimer = 0, collectibleTimer = 0;
function spawnObstacle() {
  const level = LEVELS[levelIndex];
  // mostly ground, ~1 in 3 is a duck banner
  const useHigh = Math.random() < 0.34 && level.high.length;
  const pool = useHigh ? level.high : level.ground;
  const type = pool[Math.floor(Math.random() * pool.length)];
  obstacles.push({ type, x: W + 30, scored: false });
}
function spawnCollectible() {
  const level = LEVELS[levelIndex];
  const r = Math.random();
  let type;
  if (r < 0.18) type = 'coffee';
  else if (r < 0.30) type = 'shield';
  else if (r < 0.40) type = 'slowmo';
  else type = level.collectible;
  collectibles.push({ type, x: W + 30, y: groundY - 64 - Math.random() * 46, w: 22, h: 20 });
}

// ---------- LIFECYCLE ----------
function startGame() {
  state = 'playing';
  score = 0; levelIndex = 0; levelTimer = 0; gameSpeed = 5;
  player.feetY = groundY; player.vy = 0; player.grounded = true; player.ducking = false;
  player.coffeeBoost = 0; player.slowmo = 0; player.shield = false; player.invuln = 0;
  player.won = false;
  obstacles = []; collectibles = []; particles = []; floatTexts = [];
  spawnTimer = 0; collectibleTimer = 0;
  duckHeld = false;
  initFinishLine();
}
function resetToTitle() { state = 'title'; }

function currentSpeed() {
  const level = LEVELS[levelIndex];
  let spd = gameSpeed * level.speedMult;
  if (player.coffeeBoost > 0) spd *= 1.25;
  if (player.slowmo > 0) spd *= 0.55;
  return spd;
}

function hitPlayer(reason) {
  if (player.shield) {
    player.shield = false;
    player.invuln = 40;
    flashAlpha = 0.28;
    spawnFloat(player.x + 12, player.feetY - 56, 'BLOCKED!');
    spawnParticles(player.x + 12, player.feetY - 28, 5, PAL.inkSoft);
    return;
  }
  state = 'gameover';
  deathReason = reason;
  shakeX = 8; shakeY = 4;
  if (score > hIndex) hIndex = score;
  spawnParticles(player.x + 12, player.feetY - 28, 8, PAL.inkSoft);
}

// ---------- UPDATE ----------
function update() {
  frameCount++;
  if (flashAlpha > 0.01) flashAlpha *= 0.9;
  shakeX *= 0.85; shakeY *= 0.85;

  if (state !== 'playing') { updateParticles(); return; }

  const level = LEVELS[levelIndex];
  const spd = currentSpeed();
  levelTimer++;
  score += Math.max(1, Math.floor(spd * 0.4));

  if (player.coffeeBoost > 0) player.coffeeBoost--;
  if (player.slowmo > 0) player.slowmo--;
  if (player.invuln > 0) player.invuln--;

  // ----- finish line -----
  if (finishLine) {
    finishLine.x -= spd;
    if (!finishLine.reached && finishLine.x <= player.x + STAND_W) {
      finishLine.reached = true; finishReached = true; celebrationTimer = 140;
      flashAlpha = 0.32;
      spawnParticles(player.x + 12, groundY - 40, 5, PAL.inkSoft);
    }
  }
  if (finishReached) {
    celebrationTimer--;
    // keep running animation but freeze hazards
    physics();
    updateParticles();
    if (celebrationTimer <= 0) {
      if (level.isFinal) {
        state = 'gameover'; deathReason = 'TENURE ACHIEVED!';
        player.won = true;
        if (score > hIndex) hIndex = score;
      } else {
        levelIndex++; levelTimer = 0;
        obstacles = []; collectibles = []; spawnTimer = 0; collectibleTimer = 0;
        initFinishLine();
      }
    }
    return;
  }

  physics();

  // ----- spawning (pause as finish approaches) -----
  const finishNear = finishLine && finishLine.x < W + 220;
  spawnTimer++;
  const spawnRate = Math.max(46, 92 - levelIndex * 8);
  if (!finishNear && spawnTimer > spawnRate + Math.random() * 40) { spawnObstacle(); spawnTimer = 0; }
  collectibleTimer++;
  if (!finishNear && collectibleTimer > 110 + Math.random() * 80) { spawnCollectible(); collectibleTimer = 0; }

  // ----- move & cull -----
  for (let i = obstacles.length - 1; i >= 0; i--) { obstacles[i].x -= spd; if (obstacles[i].x < -70) obstacles.splice(i, 1); }
  for (let i = collectibles.length - 1; i >= 0; i--) { collectibles[i].x -= spd; if (collectibles[i].x < -40) collectibles.splice(i, 1); }

  // ----- collisions -----
  const pb = playerBox();
  for (const obs of obstacles) {
    const ob = obstacleBox(obs);
    if (player.invuln <= 0 && intersects(pb, ob)) { hitPlayer(getDeathReason(obs.type)); break; }
    if (!obs.scored && obs.x + (OB[obs.type].w || 40) < player.x) { obs.scored = true; score += 40; }
  }
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const col = collectibles[i];
    const cb = { x: col.x, y: col.y, w: col.w, h: col.h };
    if (intersects(pb, cb)) {
      const label = applyCollectible(col.type);
      spawnFloat(col.x + 10, col.y - 2, label);
      spawnParticles(col.x + 10, col.y + 8, 3, PAL.dim);
      collectibles.splice(i, 1);
    }
  }

  updateParticles();
}

function physics() {
  // duck only while grounded
  player.ducking = duckHeld && player.grounded;
  player.vy += 0.6;
  player.feetY += player.vy;
  if (player.feetY >= groundY) { player.feetY = groundY; player.vy = 0; player.grounded = true; }
}

function applyCollectible(type) {
  switch (type) {
    case 'coffee':  player.coffeeBoost = 280; score += 20; return 'CAFFEINE';
    case 'shield':  player.shield = true;     score += 20; return 'SHIELD';
    case 'slowmo':  player.slowmo = 220;      score += 20; return 'SLOW-MO';
    default:        score += 100; return '+100'; // citation / publication / grant
  }
}

// ---------- HITBOXES ----------
function playerBox() {
  if (player.ducking) return { x: player.x + 2, y: player.feetY - DUCK_H, w: DUCK_W, h: DUCK_H };
  return { x: player.x + 3, y: player.feetY - STAND_H, w: STAND_W - 6, h: STAND_H };
}
function obstacleBox(obs) {
  const def = OB[obs.type];
  if (def.kind === 'high') return { x: obs.x + 3, y: SIGN_TOP + 3, w: def.w - 6, h: (SIGN_BOT - SIGN_TOP) - 6 };
  return { x: obs.x + 2, y: groundY - def.h, w: def.w - 4, h: def.h };
}
function intersects(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// ---------- DEATH REASONS ----------
function getDeathReason(type) {
  return ({
    papers: 'BURIED IN UNREAD PAPERS', deadline: 'MISSED THE DEADLINE',
    rejection: 'DESK REJECTED!', randr: 'REVISE & RESUBMIT... AGAIN',
    budget: 'BUDGET OVERRUN', restructuring: 'DEPARTMENT RESTRUCTURED',
    committee: 'MEETING OVERLOAD', adminmeeting: 'ETERNAL ADMIN MEETING',
    bureaucracy: 'LOST IN BUREAUCRACY', evaluation: 'DEVASTATING EVAL',
    apsrreject: 'APSR DESK REJECTION',
  })[type] || 'PUBLISH OR PERISH';
}

// ---------- DRAW ----------
function draw() {
  ctx.save();
  ctx.translate(((Math.random() - 0.5) * shakeX) | 0, ((Math.random() - 0.5) * shakeY) | 0);

  ctx.fillStyle = PAL.field; ctx.fillRect(-10, -10, W + 20, H + 20);

  if (state === 'title') {
    drawBackground(2);
    drawTitle();
  } else {
    drawBackground(state === 'playing' ? currentSpeed() : 0);
    drawFinishLine();
    collectibles.forEach(drawCollectible);
    obstacles.forEach(drawObstacle);
    // flicker while invulnerable
    if (!(player.invuln > 0 && frameCount % 6 < 3)) {
      drawScholar(player.x, player.feetY, player.grounded ? (player.ducking ? 'duck' : 'run') : 'jump');
    }
    drawParticles();
    drawHUD();
    if (state === 'gameover') drawGameOver();
  }

  if (flashAlpha > 0.01) { ctx.fillStyle = `rgba(0,0,0,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
  ctx.restore();
}

function drawTitle() {
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.ink;
  ctx.font = '34px "Press Start 2P"';
  ctx.fillText('A(r)CADE-MIA', W / 2, 86);
  ctx.fillStyle = PAL.inkSoft;
  ctx.font = '9px "Press Start 2P"';
  ctx.fillText('THE ACADEMIC CAREER RUNNER', W / 2, 112);

  // running scholar preview
  drawScholar(W / 2 - 12, groundY, Math.floor(frameCount / 30) % 4 === 0 ? 'duck' : 'run');

  // controls
  ctx.fillStyle = PAL.inkSoft;
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('SPACE / UP  =  JUMP        DOWN  =  DUCK', W / 2, groundY + 26);

  if (frameCount % 60 < 40) {
    ctx.fillStyle = PAL.ink;
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText('PRESS SPACE OR TAP TO START', W / 2, 160);
  }
  ctx.fillStyle = PAL.dim;
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText('Tim Wappenhans & Claude', W / 2, H - 12);
  ctx.textAlign = 'left';
}

function drawHUD() {
  const level = LEVELS[levelIndex];
  // level name (left)
  ctx.fillStyle = PAL.ink;
  ctx.font = '9px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText(level.name.toUpperCase(), 14, 22);

  // score + hi (right, dotted)
  ctx.textAlign = 'right';
  ctx.fillStyle = PAL.dim;
  ctx.fillText('HI ' + hIndex.toString().padStart(6, '0'), W - 14, 22);
  ctx.fillStyle = PAL.ink;
  ctx.fillText(score.toString().padStart(6, '0'), W - 120, 22);

  // progress bar (under level name)
  const pw = 150, pf = Math.min(levelTimer / level.duration, 1);
  px(14, 28, pw, 5, PAL.faint);
  px(14, 28, pw * pf, 5, level.isFinal ? PAL.ink : PAL.inkSoft);

  // active power-ups
  let ax = 14, ay = 48;
  ctx.textAlign = 'left';
  ctx.font = '7px "Press Start 2P"';
  if (player.coffeeBoost > 0) { ctx.fillStyle = PAL.inkSoft; ctx.fillText('CAFFEINE ' + Math.ceil(player.coffeeBoost / 60) + 's', ax, ay); ay += 12; }
  if (player.slowmo > 0)      { ctx.fillStyle = PAL.inkSoft; ctx.fillText('SLOW-MO ' + Math.ceil(player.slowmo / 60) + 's', ax, ay); ay += 12; }
  if (player.shield)          { ctx.fillStyle = PAL.inkSoft; ctx.fillText('SHIELD READY', ax, ay); }
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(247,247,247,0.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  if (player.won) {
    ctx.fillStyle = PAL.ink;
    ctx.font = '22px "Press Start 2P"';
    ctx.fillText('TENURE!', W / 2, H / 2 - 40);
    ctx.font = '9px "Press Start 2P"';
    ctx.fillText('YOU MADE IT THROUGH ACADEMIA', W / 2, H / 2 - 8);
    ctx.fillStyle = PAL.inkSoft;
    ctx.font = '8px "Press Start 2P"';
    ctx.fillText('FINAL SCORE  ' + score, W / 2, H / 2 + 20);
    ctx.fillText('An office. With a window.', W / 2, H / 2 + 38);
  } else {
    ctx.fillStyle = PAL.ink;
    ctx.font = '16px "Press Start 2P"';
    ctx.fillText('PUBLISH OR PERISH', W / 2, H / 2 - 40);
    ctx.font = '9px "Press Start 2P"';
    ctx.fillText(deathReason, W / 2, H / 2 - 10);
    ctx.fillStyle = PAL.inkSoft;
    ctx.font = '8px "Press Start 2P"';
    ctx.fillText('SCORE ' + score + '    h-INDEX ' + hIndex, W / 2, H / 2 + 16);
    ctx.fillText('Reached: ' + LEVELS[levelIndex].name, W / 2, H / 2 + 34);
  }

  if (frameCount % 60 < 40) {
    ctx.fillStyle = PAL.ink;
    ctx.font = '8px "Press Start 2P"';
    ctx.fillText('PRESS SPACE OR TAP TO CONTINUE', W / 2, H / 2 + 64);
  }
  ctx.textAlign = 'left';
}

// ---------- LOOP ----------
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
